<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>❤️</title>
  <style>
    :root { --bg:#0b0f14; --fg:#e8eef7; }
    html, body { height: 100%; margin: 0; }
    body{
      background: radial-gradient(1200px 800px at 50% 35%, #141b24, var(--bg));
      display:flex; align-items:center; justify-content:center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--fg);
      overflow:hidden;
      user-select:none;
    }
    .wrap{
      position:relative;
      width:min(520px, 92vw);
      aspect-ratio: 1 / 1;
      display:grid;
      place-items:center;
    }
    canvas{ width:100%; height:100%; display:block; }
    .hint{
      position:absolute;
      inset:auto 0 8%;
      text-align:center;
      font-size:clamp(14px, 2.8vw, 18px);
      opacity:.85;
      letter-spacing:.2px;
      transition: opacity .4s ease;
    }
    .love{
      position:absolute;
      text-align:center;
      font-weight:800;
      font-size:clamp(28px, 6vw, 44px);
      opacity:0;
      transform: scale(.98);
      transition: opacity .6s ease, transform .6s ease;
      text-shadow: 0 12px 40px rgba(0,0,0,.35);
      pointer-events:none;
    }
    .love small{
      display:block;
      font-weight:600;
      font-size:clamp(14px, 3vw, 18px);
      opacity:.85;
      margin-top:.35rem;
    }
    .show .love{ opacity:1; transform: scale(1); }
    .hideHint .hint{ opacity:0; }
  </style>
</head>
<body>
  <div class="wrap" id="wrap" aria-label="inimă">
    <canvas id="c"></canvas>
    <div class="love" id="love">
      Te iubesc
      <small>❤️</small>
    </div>
    <div class="hint" id="hint">Apasă oriunde ca să apară surpriza ❤️</div>
  </div>

  <script>
    const wrap = document.getElementById('wrap');
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const hint = document.getElementById('hint');

    function resize() {
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      drawBackgroundGlow(rect.width, rect.height);
    }

    function drawBackgroundGlow(w, h){
      ctx.clearRect(0,0,w,h);
      // glow discret în spate
      const g = ctx.createRadialGradient(w*0.5, h*0.42, 10, w*0.5, h*0.42, Math.min(w,h)*0.55);
      g.addColorStop(0, 'rgba(255,60,120,0.22)');
      g.addColorStop(0.6, 'rgba(255,60,120,0.05)');
      g.addColorStop(1, 'rgba(255,60,120,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0,0,w,h);
    }

    // Parametric heart curve (classic)
    // x = 16 sin^3 t
    // y = 13 cos t - 5 cos 2t - 2 cos 3t - cos 4t
    function heartPoint(t){
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
      return {x, y};
    }

    let anim = null;
    let started = false;

    function animateHeart(){
      if (anim) cancelAnimationFrame(anim);
      started = true;

      wrap.classList.add('hideHint');
      const rect = canvas.getBoundingClientRect();
      const w = rect.width, h = rect.height;

      // scale + center
      const scale = Math.min(w, h) * 0.027;  // tuning
      const cx = w * 0.5;
      const cy = h * 0.52;

      // style
      ctx.lineWidth = Math.max(3, Math.min(w,h) * 0.008);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      const strokeGrad = ctx.createLinearGradient(cx - w*0.25, cy - h*0.25, cx + w*0.25, cy + h*0.25);
      strokeGrad.addColorStop(0, 'rgba(255,80,150,1)');
      strokeGrad.addColorStop(0.5, 'rgba(255,45,95,1)');
      strokeGrad.addColorStop(1, 'rgba(255,140,180,1)');
      ctx.strokeStyle = strokeGrad;

      // animation params
      const total = 520;       // steps
      const duration = 1200;   // ms
      const t0 = performance.now();

      function frame(now){
        const p = Math.min(1, (now - t0) / duration);
        const steps = Math.floor(p * total);

        // redraw base
        drawBackgroundGlow(w,h);

        // draw path gradually
        ctx.beginPath();
        for (let i=0; i<=steps; i++){
          const t = (i/total) * Math.PI * 2;
          const pt = heartPoint(t);
          const x = cx + pt.x * scale;
          const y = cy - pt.y * scale; // invert y
          if (i===0) ctx.moveTo(x,y);
          else ctx.lineTo(x,y);
        }
        ctx.stroke();

        // soft inner glow once progressing
        if (p > 0.25){
          ctx.save();
          ctx.globalAlpha = Math.min(0.18, (p-0.25)*0.3);
          ctx.fillStyle = 'rgba(255,60,120,1)';
          ctx.beginPath();
          for (let i=0; i<=total; i++){
            const t = (i/total) * Math.PI * 2;
            const pt = heartPoint(t);
            const x = cx + pt.x * scale;
            const y = cy - pt.y * scale;
            if (i===0) ctx.moveTo(x,y);
            else ctx.lineTo(x,y);
          }
          ctx.closePath();
          ctx.filter = 'blur(10px)';
          ctx.fill();
          ctx.restore();
        }

        if (p < 1){
          anim = requestAnimationFrame(frame);
        } else {
          wrap.classList.add('show');
        }
      }

      anim = requestAnimationFrame(frame);
    }

    wrap.addEventListener('click', () => {
      // la click, re-pornește animația
      wrap.classList.remove('show');
      animateHeart();
    });

    window.addEventListener('resize', resize);
    resize();
  </script>
</body>
</html>
